<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}F1{% endblock %} — F1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens ─────────────────────────────────────────────── */
    :root {
      --red:      #E10600;
      --red-d:    #b30500;
      --black:    #15151E;
      --dark:     #1F1F27;
      --panel:    #242430;
      --panel-l:  #2c2c3a;
      --white:    #FFFFFF;
      --grey:     #909090;
      --grey-d:   #38383F;
      --line:     #333340;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ─────────────────────────────────────────────── */
    nav {
      background: var(--black);
      border-bottom: 3px solid var(--red);
      height: 4rem;
      display: flex;
      align-items: center;
      padding: 0 2rem;
      gap: 0.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      text-decoration: none;
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
      margin-right: 2rem;
      flex-shrink: 0;
    }

    .nav-brand-f1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.9rem;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .nav-brand-f1 span { color: var(--red); }

    .nav-links {
      display: flex;
      gap: 0.15rem;
      flex: 1;
    }

    .nav-links a {
      color: var(--grey);
      text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .nav-links a:hover { color: var(--white); background: var(--dark); }
    .nav-links a.active { color: var(--white); background: var(--red); }

    /* ── Main ───────────────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
    }

    /* ── Page header ────────────────────────────────────────── */
    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .page-subtitle {
      color: var(--grey);
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    /* ── Panel ──────────────────────────────────────────────── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 1.5rem;
    }

    .panel + .panel { margin-top: 1rem; }

    /* ── Table ──────────────────────────────────────────────── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    .data-table thead tr {
      border-bottom: 2px solid var(--red);
    }

    .data-table th {
      text-align: left;
      padding: 0.7rem 1rem;
      color: var(--grey);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .data-table td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      color: var(--white);
    }

    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: var(--panel-l); }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .btn-primary { background: var(--red); color: var(--white); }
    .btn-primary:hover { background: var(--red-d); }

    .btn-secondary { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn-secondary:hover { background: var(--red); color: var(--white); }

    /* ── Detail link ────────────────────────────────────────── */
    a.detail-link {
      color: var(--red);
      text-decoration: none;
      font-weight: 600;
    }
    a.detail-link:hover { text-decoration: underline; }

    /* ── Badge ──────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 3px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--red);
      color: var(--white);
    }

    /* ── Filter bar ─────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-bar input,
    .filter-bar select {
      padding: 0.5rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 4px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      background: var(--panel);
      color: var(--white);
    }

    .filter-bar input::placeholder { color: var(--grey); }
    .filter-bar input:focus,
    .filter-bar select:focus {
      outline: none;
      border-color: var(--red);
    }

    /* ── Stat grid ──────────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--panel);
      padding: 1.25rem 1rem;
      text-align: center;
    }

    .stat-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2.4rem;
      color: var(--red);
      line-height: 1;
    }

    .stat-label {
      margin-top: 0.3rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.72rem;
      color: var(--grey);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Flash messages ─────────────────────────────────────── */
    .messages { list-style: none; padding: 0; margin: 0 0 1.5rem; }
    .messages li {
      padding: 0.75rem 1rem;
      border-radius: 4px;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      border-left: 3px solid;
    }
    .messages .success { background: rgba(16,185,129,0.1); border-color: #10b981; color: #6ee7b7; }
    .messages .error   { background: rgba(225,6,0,0.1);   border-color: var(--red); color: #fca5a5; }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      background: var(--dark);
      border-top: 3px solid var(--red);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .footer-brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--white);
      letter-spacing: -0.01em;
    }

    .footer-brand span { color: var(--red); }

    .footer-copy {
      font-size: 0.8rem;
      color: var(--grey);
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav>
  <a class="nav-brand" href="{% url 'championship:home' %}">
    <span class="nav-brand-f1">F<span>1</span></span>
  </a>
  <div class="nav-links">
    <a href="{% url 'championship:drivers' %}"      {% if request.resolver_match.url_name == 'drivers'      %}class="active"{% endif %}>Drivers</a>
    <a href="{% url 'championship:constructors' %}" {% if request.resolver_match.url_name == 'constructors' %}class="active"{% endif %}>Constructors</a>
    <a href="{% url 'championship:seasons' %}"      {% if request.resolver_match.url_name == 'seasons'      %}class="active"{% endif %}>Seasons</a>
    <a href="{% url 'championship:races' %}"        {% if request.resolver_match.url_name == 'races'        %}class="active"{% endif %}>Races</a>
    <a href="{% url 'championship:circuits' %}"     {% if request.resolver_match.url_name == 'circuits'     %}class="active"{% endif %}>Circuits</a>
    <a href="{% url 'championship:sparql' %}"       {% if request.resolver_match.url_name == 'sparql'       %}class="active"{% endif %}>SPARQL</a>
  </div>
</nav>

<main>
  {% if messages %}
    <ul class="messages">
      {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}

  {% block content %}{% endblock %}
</main>

<footer>
  <div class="footer-brand">F<span>1</span></div>
  <div class="footer-copy">Formula 1 Data Explorer &mdash; WS Practical Assignment</div>
</footer>

</body>
</html>
