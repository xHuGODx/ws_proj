{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;padding:3rem 1rem;">

  <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(6rem,18vw,11rem);line-height:1;color:var(--line);letter-spacing:-0.04em;user-select:none;margin-bottom:0rem;">
    404
  </div>

  <div style="width:4px;height:3rem;background:var(--red);margin:0 auto 1.5rem;"></div>

  <h1 style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:-0.01em;color:var(--white);margin-bottom:0.6rem;">
    Page Not Found
  </h1>
  <p style="font-size:1rem;color:var(--grey);max-width:30rem;line-height:1.6;margin-bottom:2rem;">
    The page you're looking for doesn't exist or has been moved.
    Check the URL or head back to the home page.
  </p>

  <div style="display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:center;">
    <a href="/" class="btn btn-primary">&#8592; Back to Home</a>
    <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
  </div>

</div>
{% endblock %}
